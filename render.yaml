services:
  - type: web
    name: orchestra-growth
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 3000
    disk:
      name: leads-db
      mountPath: /opt/render/project/src
      sizeGB: 1
